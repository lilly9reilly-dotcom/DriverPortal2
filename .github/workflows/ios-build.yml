name: Build iOS IPA

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'وضع التوقيع (unsigned للتجربة، signed لمتجر آبل/Ad Hoc يحتاج أسرار)'
        required: true
        default: 'unsigned'
        type: choice
        options:
          - unsigned
          - signed-adhoc
          - signed-appstore

jobs:
  build-ipa:
    name: Build DriverPortal iOS IPA
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned archive
        if: ${{ github.event.inputs.mode == 'unsigned' || github.event_name == 'push' }}
        run: |
          set -eu
          rm -rf build
          xcodebuild \
            -project DriverPortalIOS.xcodeproj \
            -scheme DriverPortalIOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/DriverPortalIOS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Package unsigned IPA
        if: ${{ github.event.inputs.mode == 'unsigned' || github.event_name == 'push' }}
        run: |
          set -eu
          APP_PATH="build/DriverPortalIOS.xcarchive/Products/Applications/DriverPortalIOS.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            ls -R build/DriverPortalIOS.xcarchive || true
            exit 1
          fi
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -qr DriverPortalIOS-unsigned.ipa Payload
          rm -rf Payload
          ls -la

      - name: Build signed IPA (Ad Hoc / App Store)
        if: ${{ github.event.inputs.mode == 'signed-adhoc' || github.event.inputs.mode == 'signed-appstore' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -eu
          if [ -z "${APPLE_TEAM_ID:-}" ] || [ -z "${IOS_P12_BASE64:-}" ] || [ -z "${IOS_PROVISIONING_PROFILE_BASE64:-}" ]; then
            echo "Missing Apple signing secrets. Configure APPLE_TEAM_ID, IOS_P12_BASE64, IOS_P12_PASSWORD, IOS_PROVISIONING_PROFILE_BASE64." >&2
            exit 1
          fi

          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$IOS_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/driver-portal.mobileprovision"

          # Inject team id into export options
          if [ "${{ github.event.inputs.mode }}" = "signed-adhoc" ]; then
            EXPORT_PLIST="ExportOptions-AdHoc.plist"
          else
            EXPORT_PLIST="ExportOptions-AppStore.plist"
          fi
          /usr/libexec/PlistBuddy -c "Set :teamID $APPLE_TEAM_ID" "$EXPORT_PLIST"

          rm -rf build
          xcodebuild \
            -project DriverPortalIOS.xcodeproj \
            -scheme DriverPortalIOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/DriverPortalIOS.xcarchive \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath build/DriverPortalIOS.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist "$EXPORT_PLIST"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DriverPortalIOS-IPA
          path: ios/build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload xcarchive (for re-signing)
        uses: actions/upload-artifact@v4
        with:
          name: DriverPortalIOS-xcarchive
          path: ios/build/DriverPortalIOS.xcarchive
          if-no-files-found: error
          retention-days: 14
