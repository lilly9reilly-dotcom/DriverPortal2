name: DriverPortalIOS
options:
  deploymentTarget:
    iOS: 16.0
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: DriverPortalIOS/Configurations/DriverPortalIOS.xcconfig
  Release: DriverPortalIOS/Configurations/DriverPortalIOS.xcconfig
targets:
  DriverPortalIOS:
    type: application
    platform: iOS
    sources:
      - path: DriverPortalIOS
        excludes:
          - README.md
          - Preview Content/**
          - Preview Content
    settings:
      base:
        PRODUCT_NAME: DriverPortalIOS
        PRODUCT_BUNDLE_IDENTIFIER: com.driver.portal.ios
        INFOPLIST_FILE: DriverPortalIOS/Info.plist
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: 16.0
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""
    info:
      path: DriverPortalIOS/Info.plist
    scheme:
      gatherCoverageData: false
