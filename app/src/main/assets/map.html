<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

    <style>
        #map {
          height: 100vh;
          width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([33.3152, 44.3661], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'GPS Tracking System'
    }).addTo(map);

    var markers = {};

    function loadDrivers(){
      fetch("https://script.google.com/macros/s/AKfycbw-3wKRuKImCvvB4ip3PGokDP18yJz6HDW2QylDmvQGxAbyn8Wq-FIlHQ9ms-i7wlCEQA/exec?action=drivers")
      .then(function(res){ return res.json(); })
      .then(function(data){

        if(!data.drivers) return;

        data.drivers.forEach(function(driver){

          var lat = Number(driver.lat);
          var lng = Number(driver.lng);

          if(lat === 0 || lng === 0) return;

          if(markers[driver.driver]){
            markers[driver.driver].setLatLng([lat, lng]);
          }else{
            var marker = L.marker([lat, lng]).addTo(map);

            marker.bindPopup(
              "<b>" + driver.driver + "</b><br>" +
              "سيارة: " + driver.carNumber + "<br>" +
              "الحالة: " + driver.status + "<br>" +
              "آخر تحديث: " + driver.time
            );

            markers[driver.driver] = marker;

            // تحريك الخريطة لأول مرة فقط
            map.setView([lat, lng], 12);
          }

        });

      });
    }

    loadDrivers();
    setInterval(loadDrivers, 5000);
</script>

</body>
</html>
